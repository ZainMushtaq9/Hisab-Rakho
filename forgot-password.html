<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reset Password — Hisab Rakho</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040D12">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#040D12;color:#E8F0F7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body.light-mode{background:#F0F4F8;color:#0D1E2E}
    .card{width:100%;max-width:400px;background:#0D1E2E;border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    body.light-mode .card{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 8px 40px rgba(0,0,0,.1)}
    .logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#00C9B1,#009E8E);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;box-shadow:0 0 30px rgba(0,201,177,.25)}
    .title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
    .sub{font-size:13px;color:rgba(232,240,247,.45);text-align:center;line-height:1.55;margin-bottom:24px}
    body.light-mode .sub{color:rgba(13,30,46,.5)}
    .fl{display:block;font-size:11px;font-weight:700;color:rgba(232,240,247,.35);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
    body.light-mode .fl{color:rgba(13,30,46,.5)}
    .fi-wrap{position:relative;margin-bottom:16px}
    .fi-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:rgba(232,240,247,.3)}
    body.light-mode .fi-icon{color:rgba(13,30,46,.3)}
    .fi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#E8F0F7;font-size:14px;padding:12px 14px 12px 42px;outline:none;transition:border-color .15s,box-shadow .15s;min-height:44px;font-family:inherit}
    body.light-mode .fi{background:#F5F7FA;border-color:rgba(0,0,0,.1);color:#0D1E2E}
    .fi::placeholder{color:rgba(232,240,247,.2)}
    body.light-mode .fi::placeholder{color:rgba(13,30,46,.3)}
    .fi:focus{border-color:#00C9B1;box-shadow:0 0 0 3px rgba(0,201,177,.1)}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#00C9B1,#009E8E);color:#040D12;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s,box-shadow .15s}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,201,177,.35)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .err{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#F87171;margin-bottom:12px}
    .suc{display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:8px;padding:16px 14px;font-size:13px;color:#34D399;margin-bottom:12px;text-align:center;line-height:1.55}
    .back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#00C9B1;font-weight:600;text-decoration:none}
    .back:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔑</div>
    <div class="title">Reset Password</div>
    <div class="sub">Enter your account email and we'll send you a link to reset your password instantly.</div>

    <div class="err" id="err"></div>
    <div class="suc" id="suc">
      ✅ Reset email sent!<br>
      Check your inbox (and spam folder) for the reset link.<br>
      The link expires in 1 hour.
    </div>

    <label class="fl">Email Address</label>
    <div class="fi-wrap">
      <span class="fi-icon">✉️</span>
      <input class="fi" id="email" type="email" placeholder="your@email.com" autocomplete="email">
    </div>

    <button class="btn" id="btn" onclick="doReset()">📧 Send Reset Link</button>
    <a class="back" href="login.html">← Back to Login</a>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script>
    (function(){if(localStorage.getItem('hr_theme')==='light')document.body.classList.add('light-mode')})();
    async function doReset(){
      const email = document.getElementById('email').value.trim();
      const errEl = document.getElementById('err');
      const sucEl = document.getElementById('suc');
      errEl.style.display='none'; sucEl.style.display='none';
      if(!email){ errEl.textContent='Please enter your email address.'; errEl.style.display='block'; return; }
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent='Please enter a valid email.'; errEl.style.display='block'; return; }
      const btn = document.getElementById('btn');
      btn.disabled=true; btn.textContent='Sending...';
      try {
        await firebase.auth().sendPasswordResetEmail(email);
        sucEl.style.display='block';
        btn.textContent='✅ Email Sent';
      } catch(e) {
        let msg = 'Failed to send reset email. Please try again.';
        if(e.code==='auth/user-not-found') msg='No account found with this email address.';
        else if(e.code==='auth/invalid-email') msg='Invalid email address format.';
        else if(e.code==='auth/too-many-requests') msg='Too many attempts. Please wait a moment.';
        errEl.textContent=msg; errEl.style.display='block';
        btn.disabled=false; btn.textContent='📧 Send Reset Link';
      }
    }
    document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
  </script>
</body>
</html>
