<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Returns — Hisab Rakho</title>
  <link rel="manifest" href="manifest.json"><meta name="theme-color" content="#040D12">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Plus Jakarta Sans',sans-serif;background:#040D12;color:#E8F0F7;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:inherit;border:none;background:none}body.light-mode{background:#F0F4F8;color:#0D1E2E}
    .sidebar{width:250px;position:fixed;top:0;left:0;bottom:0;background:#071520;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;z-index:200;overflow:hidden;transition:transform .3s}body.light-mode .sidebar{background:#fff;border-right-color:rgba(0,0,0,.08)}.sb-brand{padding:14px;border-bottom:1px solid rgba(255,255,255,.07)}.sb-logo-row{display:flex;align-items:center;gap:9px;margin-bottom:12px}.sb-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00C9B1,#009E8E);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}.sb-logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}.sb-logo-text em{color:#00C9B1;font-style:normal}.sb-shop-chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:9px}.sb-shop-av{font-size:16px}.sb-shop-name{font-size:12px;font-weight:700}.sb-shop-plan{font-size:10px;font-weight:700;color:#F5A623;margin-top:1px}.sb-nav{flex:1;overflow-y:auto;padding:6px 8px}.sb-nav::-webkit-scrollbar{width:0}.sb-sec-lbl{font-size:9px;font-weight:700;color:rgba(232,240,247,.25);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 3px}.nav-link{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;font-size:13px;font-weight:500;color:rgba(232,240,247,.55);transition:all .15s;margin-bottom:1px;text-decoration:none}.nav-link:hover{background:rgba(255,255,255,.04);color:#E8F0F7}.nav-link.active{background:rgba(0,201,177,.1);color:#00C9B1;font-weight:600}.nav-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.07)}.upgrade-card{background:linear-gradient(135deg,rgba(0,201,177,.12),rgba(0,158,142,.08));border:1px solid rgba(0,201,177,.2);border-radius:12px;padding:10px 12px;text-align:center}.upgrade-title{font-size:12px;font-weight:700;color:#00C9B1}.upgrade-sub{font-size:10px;color:rgba(232,240,247,.35);margin:2px 0 8px}.upgrade-btn{width:100%;padding:7px;background:linear-gradient(135deg,#00C9B1,#009E8E);border:none;border-radius:8px;color:#040D12;font-size:11px;font-weight:700;cursor:pointer}
    .main-area{margin-left:250px;min-height:100vh;display:flex;flex-direction:column;flex:1;min-width:0}.topbar{position:sticky;top:0;z-index:300;height:56px;background:rgba(4,13,18,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}body.light-mode .topbar{background:rgba(255,255,255,.95);border-bottom-color:rgba(0,0,0,.08)}.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}.topbar-right{display:flex;align-items:center;gap:8px}.icon-btn{width:34px;height:34px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:inherit}.logout-btn{display:flex;align-items:center;gap:5px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#F87171;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;white-space:nowrap}.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:999px;padding:3px 12px 3px 3px;cursor:pointer}.user-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#00C9B1,#009E8E);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#040D12}.user-nm{font-size:12px;font-weight:600}.menu-toggle{display:none;width:34px;height:34px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:inherit}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
    .page-content{padding:20px}
    .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.toolbar-search{flex:1;min-width:200px;position:relative}.toolbar-search input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;color:#E8F0F7;font-size:14px;padding:10px 14px 10px 40px;outline:none;font-family:inherit}body.light-mode .toolbar-search input{background:#F5F7FA;border-color:rgba(0,0,0,.08);color:#0D1E2E}.toolbar-search input:focus{border-color:#00C9B1}.toolbar-search input::placeholder{color:rgba(232,240,247,.2)}.toolbar-search .ts-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(232,240,247,.25);pointer-events:none}.toolbar-btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:linear-gradient(135deg,#00C9B1,#009E8E);color:#040D12;border:none}
    .ret-list{display:flex;flex-direction:column;gap:8px}
    .ret-card{background:#0D1E2E;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}body.light-mode .ret-card{background:#fff;border-color:rgba(0,0,0,.08)}
    .rc-ico{width:40px;height:40px;border-radius:10px;background:rgba(245,166,35,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .rc-info{flex:1;min-width:0}.rc-name{font-size:13px;font-weight:600}.rc-meta{font-size:11px;color:rgba(232,240,247,.35);margin-top:2px}
    .rc-amt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#F5A623;flex-shrink:0}
    .rc-del{color:#F87171;font-size:14px;cursor:pointer;padding:6px;flex-shrink:0}
    .empty-state{text-align:center;padding:60px 20px;color:rgba(232,240,247,.3)}.empty-state .es-icon{font-size:48px;margin-bottom:12px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,13,18,.85);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center}.modal-overlay.open{display:flex}.modal{background:#0D1E2E;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;width:100%;max-width:600px;margin:16px}body.light-mode .modal{background:#fff;border-color:rgba(0,0,0,.1)}.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between}.modal-close{font-size:18px;cursor:pointer;color:rgba(232,240,247,.4)}
    .fg{margin-bottom:12px}.fl{display:block;font-size:11px;font-weight:700;color:rgba(232,240,247,.35);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}body.light-mode .fl{color:rgba(13,30,46,.45)}.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#E8F0F7;font-size:14px;padding:11px 14px;outline:none;min-height:44px;font-family:inherit}body.light-mode .fi{background:#F5F7FA;border-color:rgba(0,0,0,.1);color:#0D1E2E}.fi:focus{border-color:#00C9B1}
    select.fi{appearance:none;padding-right:36px}select.fi option{background:#071520}
    .btn-main{width:100%;padding:12px;background:linear-gradient(135deg,#00C9B1,#009E8E);color:#040D12;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}.btn-main:disabled{opacity:.45;cursor:not-allowed}.form-error{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:#F87171;margin-bottom:10px}
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#071520;border-top:1px solid rgba(255,255,255,.07);z-index:250;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}body.light-mode .mobile-nav{background:#fff;border-top-color:rgba(0,0,0,.08)}.mob-nav-inner{display:flex;justify-content:space-around}.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;font-size:10px;font-weight:600;color:rgba(232,240,247,.4);text-decoration:none}.mob-nav-item.active{color:#00C9B1}.mob-nav-icon{font-size:18px}
    #toast-container{position:fixed;bottom:20px;right:20px;z-index:9999}
    @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.open{display:block}.menu-toggle{display:flex}.main-area{margin-left:0}.mobile-nav{display:block}.page-content{padding:12px;padding-bottom:80px}}
    @media(max-width:480px){.fi{font-size:16px}}
  </style>

  <script>if(JSON.parse(localStorage.getItem('hr_user')||'{}').role === 'customer') location.href='customer-dashboard.html';</script>
</head>
<body>
  <div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
  <div style="display:flex;min-height:100vh;width:100%">
    <aside class="sidebar" id="sidebar">
      <div class="sb-brand"><div class="sb-logo-row"><div class="sb-logo-icon">🏪</div><div class="sb-logo-text">Hisab <em>Rakho</em></div></div><div class="sb-shop-chip"><div class="sb-shop-av">🛒</div><div><div class="sb-shop-name" id="sb-shop">Shop</div><div class="sb-shop-plan">FREE</div></div></div></div>
      <nav class="sb-nav">
        <div class="sb-sec-lbl">MAIN</div>
        <a href="dashboard.html" class="nav-link"><span class="nav-ico">🏠</span>Dashboard</a><a href="pos.html" class="nav-link"><span class="nav-ico">💳</span>New Sale</a><a href="inventory.html" class="nav-link"><span class="nav-ico">📦</span>Inventory</a><a href="customers.html" class="nav-link"><span class="nav-ico">👥</span>Customers</a><a href="suppliers.html" class="nav-link"><span class="nav-ico">🚚</span>Suppliers</a><a href="bills.html" class="nav-link"><span class="nav-ico">🧾</span>Bills</a>
        <div class="sb-sec-lbl" style="margin-top:10px">FINANCE</div>
        <a href="expenses.html" class="nav-link"><span class="nav-ico">💸</span>Expenses</a><a href="daily-cash.html" class="nav-link"><span class="nav-ico">💰</span>Daily Cash</a><a href="returns.html" class="nav-link active"><span class="nav-ico">↩</span>Returns</a>
        <div class="sb-sec-lbl" style="margin-top:10px">CUSTOMER PORTAL</div>
        <a href="shop-requests.html" class="nav-link"><span class="nav-ico">🔔</span>Requests</a>
        
        <div class="sb-sec-lbl" style="margin-top:10px">SETTINGS</div>
        <a href="settings.html" class="nav-link"><span class="nav-ico">⚙️</span>Settings</a>
      </nav>
      <div class="sb-footer"><div class="upgrade-card"><div class="upgrade-title">⚡ Upgrade</div><div class="upgrade-sub">Unlimited features</div><button class="upgrade-btn" onclick="location.href='subscription.html'">Rs. 999/mo →</button></div></div>
    </aside>
    <div class="main-area">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px"><button class="menu-toggle" onclick="openSidebar()">☰</button><div class="topbar-title">↩ Returns</div></div>
        <div class="topbar-right"><div class="icon-btn" onclick="toggleTheme()"><span class="theme-toggle-btn">🌙</span></div><div class="user-pill"><div class="user-av" id="user-av">U</div><div class="user-nm" id="user-nm">User</div></div><button class="logout-btn" onclick="signOut()">⏻ Logout</button></div>
      </div>
      <div class="page-content">
        <div class="toolbar"><div class="toolbar-search"><span class="ts-icon">🔍</span><input type="text" id="search" placeholder="Search returns..." oninput="filterReturns()"></div><button class="toolbar-btn" onclick="openModal()">➕ New Return</button></div>
        <div class="ret-list" id="ret-list"><div class="empty-state"><div class="es-icon">⏳</div>Loading...</div></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title"><span>↩ Record Return</span><span class="modal-close" onclick="closeModal()">✕</span></div>
      <div class="form-error" id="modal-err"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start">
        <div class="fg" style="margin-bottom:0"><label class="fl">Bill Number / Reference *</label><input class="fi" id="m-bill" placeholder="Bill number or reference"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Customer Name</label><input class="fi" id="m-cust" placeholder="Customer name"></div>
        <div class="fg" style="margin-bottom:0;grid-column:1/-1"><label class="fl">Product Name *</label><input class="fi" id="m-product" placeholder="Returned product name"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Quantity *</label><input class="fi" id="m-qty" type="number" placeholder="1" min="1" value="1"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Refund Amount (Rs.) *</label><input class="fi" id="m-refund" type="number" placeholder="0" min="0"></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Reason</label><select class="fi" id="m-reason"><option value="defective">Defective/Damaged</option><option value="wrong">Wrong Product</option><option value="expiry">Expired</option><option value="customer_change">Customer Changed Mind</option><option value="other">Other</option></select></div>
        <div class="fg" style="margin-bottom:0"><label class="fl">Notes</label><input class="fi" id="m-notes" placeholder="Additional notes"></div>
      </div>
      <button class="btn-main" id="modal-btn" onclick="saveReturn()">Record Return →</button>
    </div>
  </div>

  <nav class="mobile-nav"><div class="mob-nav-inner"><a href="dashboard.html" class="mob-nav-item"><span class="mob-nav-icon">🏠</span>Home</a><a href="pos.html" class="mob-nav-item"><span class="mob-nav-icon">➕</span>Sale</a><a href="inventory.html" class="mob-nav-item"><span class="mob-nav-icon">📦</span>Inventory</a><a href="customers.html" class="mob-nav-item"><span class="mob-nav-icon">👥</span>Customers</a><a href="settings.html" class="mob-nav-item"><span class="mob-nav-icon">⚙️</span>More</a></div></nav>
  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/data-service.js"></script>

  <script>
    (function(){if(localStorage.getItem('hr_theme')==='light'){document.body.classList.add('light-mode');document.querySelectorAll('.theme-toggle-btn').forEach(b=>b.textContent='☀️')}
      const shop=JSON.parse(localStorage.getItem('hr_shop')||'{}');const user=JSON.parse(localStorage.getItem('hr_user')||'{}');
      if(shop.name)document.getElementById('sb-shop').textContent=shop.name;
      if(user.name){document.getElementById('user-nm').textContent=user.name;document.getElementById('user-av').textContent=(user.name[0]||'U').toUpperCase()}
    })();
    function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sb-overlay').classList.add('open')}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open')}

    let allReturns=[];
    const reasonLabels={defective:'Defective/Damaged',wrong:'Wrong Product',expiry:'Expired',customer_change:'Changed Mind',other:'Other'};

    async function loadReturns(){
      try{
        allReturns = await DataService.getReturns(500);
        renderReturns(allReturns);
      }catch(e){console.error(e);toast('Load error','error')}
    }

    function filterReturns(){const q=(document.getElementById('search').value||'').toLowerCase().trim();renderReturns(q?allReturns.filter(r=>(r.productName||'').toLowerCase().includes(q)||(r.customerName||'').toLowerCase().includes(q)||(r.billNumber||'').toLowerCase().includes(q)):allReturns)}

    function renderReturns(rets){
      const el=document.getElementById('ret-list');
      if(!rets.length){el.innerHTML='<div class="empty-state"><div class="es-icon">↩</div>No returns recorded<br><button onclick="openModal()" style="color:#00C9B1;font-weight:600;background:none;border:none;cursor:pointer;font-size:14px;margin-top:8px">Record a return →</button></div>';return}
      el.innerHTML=rets.map(r=>{
        const ts=r.createdAt?.toDate?r.createdAt.toDate():new Date(r.createdAt||Date.now());
        return`<div class="ret-card">
          <div class="rc-ico">↩</div>
          <div class="rc-info"><div class="rc-name">${r.productName||'Product'} × ${r.qty||1}</div><div class="rc-meta">${r.customerName||'—'} · ${reasonLabels[r.reason]||r.reason||'—'} · ${formatDateTime(ts)}</div></div>
          <div class="rc-amt">-${fmtCur(r.refundAmount||0)}</div>
          <div class="rc-del" onclick="delReturn('${r.id}')">🗑</div></div>`;
      }).join('');
    }

    function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('modal-err').style.display='none';['m-bill','m-cust','m-product','m-refund','m-notes'].forEach(i=>document.getElementById(i).value='');document.getElementById('m-qty').value='1'}
    function closeModal(){document.getElementById('modal').classList.remove('open')}

    async function saveReturn(){
      const product=document.getElementById('m-product').value.trim();const refund=parseFloat(document.getElementById('m-refund').value);const qty=parseInt(document.getElementById('m-qty').value)||1;
      const err=document.getElementById('modal-err');err.style.display='none';
      if(!product){err.textContent='Product name is required';err.style.display='block';return}
      if(!refund||refund<0){err.textContent='Enter a valid refund amount';err.style.display='block';return}
      const btn=document.getElementById('modal-btn');btn.disabled=true;
      try{
        await db.collection('returns').add({
          shopId:getShopId(),
          billNumber:document.getElementById('m-bill').value.trim(),
          customerName:document.getElementById('m-cust').value.trim()||'Walk-in',
          productName:product,qty,refundAmount:refund,
          reason:document.getElementById('m-reason').value,
          notes:document.getElementById('m-notes').value.trim(),
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('Return recorded!','success');closeModal();loadReturns();
      }catch(e){err.textContent=e.message;err.style.display='block'}
      finally{btn.disabled=false}
    }

    async function delReturn(id){if(!confirm('Delete this return?'))return;try{await db.collection('returns').doc(id).delete();toast('Deleted','success');loadReturns()}catch(e){toast('Error: '+e.message,'error')}}

    auth.onAuthStateChanged(u=>{if(!u){location.href='login.html';return}loadReturns()});
  </script>
</body>
</html>
